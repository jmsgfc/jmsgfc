name: Generate Snake Contribution

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/generate-snake.yml
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-contribution-grid-snake.svg?palette=github-light&color_snake=#7B61FF&color_dots=#ebedf0,#dbeafe,#93c5fd,#60a5fa,#2563eb
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#FF8A65&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

      - name: Commit generated snake assets
        run: |
          if git diff --quiet -- assets/github-contribution-grid-snake.svg assets/github-contribution-grid-snake-dark.svg; then
            echo "No snake changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-contribution-grid-snake.svg assets/github-contribution-grid-snake-dark.svg
          git commit -m "update snake contribution"
          git push
