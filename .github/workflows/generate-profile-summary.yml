name: Generate Profile Summary Cards

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/generate-profile-summary.yml
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate summary cards
        env:
          USERNAME: ${{ github.repository_owner }}
        run: |
          mkdir -p profile-summary-card-output/default

          curl -fsSL --retry 3 "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=${USERNAME}&theme=default" -o profile-summary-card-output/default/0-profile-details.svg
          curl -fsSL --retry 3 "https://github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=${USERNAME}&theme=default" -o profile-summary-card-output/default/1-repos-per-language.svg
          curl -fsSL --retry 3 "https://github-profile-summary-cards.vercel.app/api/cards/most-commit-language?username=${USERNAME}&theme=default" -o profile-summary-card-output/default/2-most-commit-language.svg
          curl -fsSL --retry 3 "https://github-profile-summary-cards.vercel.app/api/cards/stats?username=${USERNAME}&theme=default" -o profile-summary-card-output/default/3-stats.svg
          curl -fsSL --retry 3 "https://github-profile-summary-cards.vercel.app/api/cards/productive-time?username=${USERNAME}&theme=default&utcOffset=8" -o profile-summary-card-output/default/4-productive-time.svg

      - name: Commit generated profile summary cards
        run: |
          if git diff --quiet -- profile-summary-card-output/default; then
            echo "No profile summary changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output/default
          git commit -m "update profile summary cards"
          git push
